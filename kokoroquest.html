<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokoro Quest - Akademie komunikace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gloss: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 51%, rgba(255,255,255,0.1) 100%);
            --aero-blue: rgba(135, 206, 250, 0.3);
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none; 
        }

        body { 
            font-family: 'Segoe UI', 'Open Sans', sans-serif; 
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2560') no-repeat center center fixed;
            overscroll-behavior: none;
            background-size: cover;
            color: #004d7a;
            overflow: hidden;
        }

        .glass-panel {
            background: var(--aero-blue);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2), inset 0 0 20px rgba(255,255,255,0.4);
            position: relative;
            overflow: hidden;
        }

        .glass-panel::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--gloss);
            pointer-events: none;
            border-radius: inherit;
            z-index: 0;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #scene-visual {
            background-size: cover;
            background-position: center;
            transition: background-image 0.8s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-0 sm:p-6">

    <a href="index.html" class="glass-panel fixed top-6 left-6 w-12 h-12 rounded-full flex items-center justify-center z-50 transition-all hover:scale-110 active:scale-95 group" title="Zpět na výběr">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#004d7a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
    </a>

    <div id="game-container" class="w-full max-w-4xl sm:rounded-[40px] glass-panel flex flex-col h-screen h-[100dvh] sm:h-[90dvh] relative">
        
        <div id="hud" class="absolute top-20 sm:top-0 w-full p-4 flex justify-between gap-2 z-20 hidden">
        </div>

        <div id="scene-visual" class="flex-1 flex flex-col items-center justify-center p-6 relative overflow-hidden">
            <div id="bg-overlay" class="absolute inset-0 bg-black/10 z-0"></div>
            <div id="avatar" class="z-10 text-8xl sm:text-[150px] drop-shadow-2xl transition-all duration-700 transform scale-100">🌸</div>
            <div id="character-name" class="z-10 mt-6 bg-white/80 px-6 py-2 rounded-full text-[#004d7a] font-bold tracking-wider backdrop-blur-md border border-white/50 shadow-lg">Systém</div>
        </div>

        <div id="dialog-panel" class="bg-white/40 backdrop-blur-2xl p-4 sm:p-8 border-t border-white/50 z-10">
            <div id="lesson-box" class="hidden bg-blue-500/20 border-l-4 border-blue-600 p-4 mb-6 rounded-r-lg shadow-inner flex items-start">
                <p id="lesson-text" class="text-sm sm:text-base text-blue-900 font-semibold leading-snug"></p>
            </div>
            
            <div class="min-h-[60px] mb-6">
                <p id="dialog-text" class="text-lg sm:text-2xl leading-relaxed text-[#003355] font-semibold"></p>
            </div>

            <div id="choices-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[30dvh] overflow-y-auto pb-2 pr-2 custom-scrollbar">
            </div>
        </div>
    </div>

    <script>
        const storyData = {
            'intro_1': {
                character: 'Systém', avatar: '🌸', bg: 'bg-gradient-to-br from-indigo-900 to-purple-800',
                text: 'Vítej na Akademii komunikace. Tvůj cíl je jednoduchý: projít prvním dnem, aniž bys ztratil svou tvář.',
                choices: [{ text: 'Jsem připraven vstoupit do školy.', next: 'story_corridor_morning' }]
            },
            'story_corridor_morning': {
                character: 'Vnitřní monolog', avatar: '🏫',
                text: 'První den na Akademii. Slunce svítí skrz velká okna a chodby už bzučí hovorem studentů. Zhluboka se nadechneš. Najednou si všimneš, že k tobě rázným krokem míří Yumi, tvá partnerka na ročníkový projekt. Vypadá... naštvaně.',
                choices: [{ text: 'Jít jí naproti...', next: 'scene_1_yumi' }]
            },
            'scene_1_yumi': {
                character: 'Yumi (Spolužačka)', avatar: '🙎🏻‍♀️', bg: 'bg-gradient-to-b from-blue-200 to-pink-200',
                text: 'No konečně! Trvalo ti to tak dlouho, že jsem ten náš společný referát radši udělala skoro celý sama. Ne že bys mi k něčemu byl... ale aspoň to máš bez práce. Jsi mi dlužníkem.',
                choices: [
                    { text: 'Promiň... vím, že jsem pomalý. Děkuju ti. Koupím ti za to oběd.', type: 'passive', impact: { courage: -10, empathy: 5, boundaries: -15 }, next: 'dojo_yumi_passive' },
                    { text: 'Co si o sobě myslíš?! Domluvili jsme se přece na osmou a je přesně osm. Jestli jsi to udělala dřív, je to tvůj problém!', type: 'aggressive', impact: { courage: 15, empathy: -20, boundaries: 5 }, next: 'dojo_yumi_aggressive' },
                    { text: 'Jsem tu přesně v domluvený čas, Yumi. Nelíbí se mi, jak se mnou mluvíš. Co z referátu ještě zbývá dodělat společně?', type: 'assertive', impact: { courage: 10, empathy: 10, boundaries: 15 }, next: 'dojo_yumi_assertive' }
                ]
            },
            'dojo_yumi_passive': {
                isDojo: true, character: 'Sensei Kaito', avatar: '🥷', bg: 'bg-slate-900 text-white',
                text: 'Zvolil jsi pasivní přístup. Přijal jsi falešnou vinu a dokonce ses nabídl jako dlužník! Tvé hranice (Shield) klesají. Takhle z tebe brzy udělají sluhu.',
                lesson: 'Technika: Ignorování manipulativní vaty. Soustřeď se na fakta (jsi tu včas), ne na emoce útočníka.',
                choices: [{ text: 'Zhluboka se nadechnout a pokračovat...', next: 'story_after_class' }]
            },
            'dojo_yumi_aggressive': {
                isDojo: true, character: 'Sensei Kaito', avatar: '🥷', bg: 'bg-slate-900 text-white',
                text: 'Agresivní obrana! Yumi tě úspěšně vyprovokovala. Tvá Odvaha (Flame) sice roste, ale Empatie (Heart) krvácí. Vytvořil jsi konflikt hned ráno.',
                lesson: 'Pamatuj: Asertivita neznamená útočit. Bránit se dá i bez zvyšování hlasu a obviňování.',
                choices: [{ text: 'Zkusit se uklidnit a pokračovat...', next: 'story_after_class' }]
            },
            'dojo_yumi_assertive': {
                isDojo: true, character: 'Sensei Kaito', avatar: '🥷', bg: 'bg-slate-900 text-white',
                text: 'Výborně. Ukázková asertivita. Odmítl jsi nepodloženou vinu, ohradil ses proti tónu (Hranice) a zároveň situaci vrátil k řešení úkolu (Odvaha + Empatie).',
                lesson: 'Technika: Otevřená komunikace. Vracíš pozornost k faktům a nenecháš se zatáhnout do emoční hry.',
                choices: [{ text: 'S klidnou myslí jít do třídy...', next: 'story_after_class' }]
            },
            'story_after_class': {
                character: 'Vnitřní monolog', avatar: '📚', bg: 'bg-gradient-to-b from-orange-300 to-amber-200',
                text: 'Konečně konec dopoledního vyučování. Hlava ti třeští ze všech těch nových informací. Chceš jen zapadnout na svůj odpolední kroužek a mít klid. Když ale procházíš hlavní halou, cestu ti zablokuje něčí stín.',
                choices: [{ text: 'Podívat se, kdo to je...', next: 'scene_2_ren' }]
            },
            'scene_2_ren': {
                character: 'Senpai Ren (Předseda rady)', avatar: '🤴', bg: 'bg-gradient-to-b from-amber-100 to-yellow-300',
                text: '(Zastoupí ti cestu) Hej, nováčku. Dnes odpoledne má rada důležitou schůzi. Potřebuju, abys za mě vytřel tělocvičnu. Je to tradice, prváci musí pomáhat starším. Ber to jako poctu.',
                choices: [
                    { text: 'Ach... dobře. Zrovna dneska jsem sice měl trénink, ale nějak to zvládnu. Je to přece tradice.', type: 'passive', impact: { courage: -15, empathy: 5, boundaries: -20 }, next: 'dojo_ren_passive' },
                    { text: 'Rozumím, že toho máte na radě hodně, ale tělocvičnu dnes odpoledne nevytřu. Mám po škole svůj vlastní program.', type: 'assertive', impact: { courage: 15, empathy: 5, boundaries: 20 }, next: 'scene_2_ren_pushback' },
                    { text: 'Zbláznil ses?! Nejsem tvůj sluha. Vytři si to sám, ty namyšlenej kravaťáku.', type: 'aggressive', impact: { courage: 10, empathy: -25, boundaries: 10 }, next: 'dojo_ren_aggressive' }
                ]
            },
            'scene_2_ren_pushback': {
                character: 'Senpai Ren', avatar: '🤴', bg: 'bg-gradient-to-b from-amber-200 to-red-300',
                text: 'Ale no tak! Tvůj "program" počká. Tohle je pro dobro školy. Přece nechceš, abych si tě pamatoval jako toho neochotného prváka?',
                choices: [
                    { text: 'Tak dobře... nechci mít problémy. Udělám to.', type: 'passive', impact: { courage: -20, boundaries: -25 }, next: 'dojo_ren_broken' },
                    { text: 'Je mi líto, jestli tě to zklamalo, ale jak jsem řekl: tělocvičnu dnes odpoledne nevytřu.', type: 'assertive', impact: { courage: 10, boundaries: 15 }, next: 'dojo_ren_success' }
                ]
            },
            'dojo_ren_passive': {
                isDojo: true, character: 'Sensei Kaito', avatar: '🥷', bg: 'bg-slate-900 text-white',
                text: 'Podlehl jsi falešné autoritě a argumentu "tradice". Tvé hranice se hroutí.',
                lesson: 'Manipulátoři často používají slova jako "tradice" nebo "čest", aby tě donutili k ústupkům.',
                choices: [{ text: 'Pokračovat...', next: 'story_lunch_break' }]
            },
            'dojo_ren_success': {
                isDojo: true, character: 'Sensei Kaito', avatar: '🥷', bg: 'bg-slate-900 text-white',
                text: 'Perfektní použití Pokažené gramofonové desky!',
                lesson: 'Technika: Gramofonová deska. Klidné opakování stejného stanoviska bez přidávání nových argumentů.',
                choices: [{ text: 'Pokračovat...', next: 'story_lunch_break' }]
            },
            'story_lunch_break': {
                character: 'Vnitřní monolog', avatar: '🍱', bg: 'bg-gradient-to-b from-emerald-300 to-teal-200',
                text: 'Konečně čas na oběd. Najdeš si klidné místo na střeše, ale vtrhne tam tvůj kamarád Taro a vypadá zoufale.',
                choices: [{ text: 'Zeptat se, co se děje...', next: 'scene_3_taro' }]
            },
            'scene_3_taro': {
                character: 'Taro (Kamarád)', avatar: '🥺', bg: 'bg-gradient-to-b from-green-100 to-teal-200',
                text: 'Prosím, zachraň mě! Utratil jsem vše za gacha hry a nemám na vlak. Půjčíš mi zase pětistovku? Jsi můj jediný pravý kamarád!',
                choices: [
                    { text: 'No tak dobře... Tady máš. Ale příště už fakt ne.', type: 'passive', impact: { courage: -10, empathy: 10, boundaries: -20 }, next: 'dojo_taro_passive' },
                    { text: 'Taro, mám tě rád, ale další peníze ti už nepůjčím. Ještě jsi mi nevrátil ty minulé.', type: 'assertive', impact: { courage: 15, empathy: 15, boundaries: 20 }, next: 'dojo_taro_assertive' },
                    { text: 'Jsi úplnej idiot! Nedám ti ani korunu!', type: 'aggressive', impact: { courage: 10, empathy: -30, boundaries: 10 }, next: 'dojo_taro_aggressive' }
                ]
            },
            'dojo_taro_assertive': {
                isDojo: true, character: 'Sensei Kaito', avatar: '🥷', bg: 'bg-slate-900 text-white',
                text: 'Brilantní. Oddělil jsi vztah od problému.',
                lesson: 'Při odmítání blízkých je klíčové ujistit je o vztahu, ale zůstat pevný v samotném odmítnutí.',
                choices: [{ text: 'Dojíst oběd...', next: 'story_end_of_day' }]
            },
            'story_end_of_day': {
                character: 'Vnitřní monolog', avatar: '🌇', bg: 'bg-gradient-to-b from-purple-600 to-orange-500',
                text: 'Slunce zapadá. První den na Akademii končí. Jak jsi dopadl?',
                choices: [{ text: 'Zobrazit hodnocení', next: 'ending' }]
            }
        };

        let stats = { courage: 50, empathy: 50, boundaries: 50 };
        let currentNode = 'intro_1';

        const svgIcons = {
            courage: `<svg class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.99 7.99 0 0120 13a7.99 7.99 0 01-2.343 5.657z"></path></svg>`,
            empathy: `<svg class="w-5 h-5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>`,
            boundaries: `<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>`
        };

        function updateHUD() {
            const hud = document.getElementById('hud');
            if (currentNode === 'intro_1' || currentNode === 'ending') {
                hud.classList.add('hidden');
                return;
            }
            hud.classList.remove('hidden');
            hud.innerHTML = `
                ${createStatBar('courage', stats.courage, 'text-orange-400')}
                ${createStatBar('empathy', stats.empathy, 'text-pink-400')}
                ${createStatBar('boundaries', stats.boundaries, 'text-blue-400')}
            `;
        }

        function createStatBar(key, value, colorClass) {
            return `
                <div class="flex items-center space-x-2 bg-white/40 px-3 py-1.5 rounded-xl border border-white/50 backdrop-blur-md shadow-sm">
                    ${svgIcons[key]}
                    <div class="flex-1 w-16 sm:w-24 bg-white/30 rounded-full h-2 overflow-hidden">
                        <div class="h-full ${colorClass.replace('text-', 'bg-')} transition-all duration-700" style="width: ${value}%"></div>
                    </div>
                </div>
            `;
        }

        function renderScene(nodeKey) {
            const scene = storyData[nodeKey];
            if (!scene) return renderEnding();

            const visual = document.getElementById('scene-visual');
            visual.style.backgroundImage = scene.image || (scene.bg ? 'none' : '');

            document.getElementById('avatar').innerText = scene.avatar;
            document.getElementById('character-name').innerText = scene.character;
            document.getElementById('dialog-text').innerText = scene.text;

            // Dojo lesson
            const lessonBox = document.getElementById('lesson-box');
            if (scene.isDojo && scene.lesson) {
                lessonBox.classList.remove('hidden');
                document.getElementById('lesson-text').innerText = scene.lesson;
            } else {
                lessonBox.classList.add('hidden');
            }

            // Choices
            const choicesContainer = document.getElementById('choices-container');
            choicesContainer.innerHTML = '';
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-2xl border transition-all duration-200 active:scale-[0.98] flex items-center justify-between group bg-white/60 hover:bg-white/90 border-white/50 hover:border-blue-300 text-[#004d7a] font-medium shadow-sm fade-in";
                btn.innerHTML = `<span>${choice.text}</span> <span class="opacity-30 group-hover:opacity-100 transition-opacity">→</span>`;
                btn.onclick = () => handleChoice(choice);
                choicesContainer.appendChild(btn);
            });

            updateHUD();
        }

        function handleChoice(choice) {
            if (choice.impact) {
                stats.courage = Math.min(100, Math.max(0, stats.courage + (choice.impact.courage || 0)));
                stats.empathy = Math.min(100, Math.max(0, stats.empathy + (choice.impact.empathy || 0)));
                stats.boundaries = Math.min(100, Math.max(0, stats.boundaries + (choice.impact.boundaries || 0)));
            }
            currentNode = choice.next;
            renderScene(currentNode);
        }

        function renderEnding() {
            let title = "Průměrný student";
            if (stats.boundaries < 30) title = "Rohožka";
            else if (stats.empathy < 30) title = "Záporák";
            else if (stats.courage > 70 && stats.boundaries > 70 && stats.empathy > 70) title = "Mistr Komunikace (S Rank)";

            document.getElementById('game-container').innerHTML = `
                <div class="flex flex-col items-center justify-center p-8 text-center h-full fade-in">
                    <div class="text-6xl mb-4">🎓</div>
                    <h2 class="text-3xl font-bold mb-2 text-[#004d7a]">Den u konce</h2>
                    <p class="text-xl text-purple-400 font-bold mb-8">${title}</p>
                    <div class="w-full space-y-4 max-w-sm mb-8">
                        ${createEndingStat("Odvaha", stats.courage, "bg-orange-500")}
                        ${createEndingStat("Empatie", stats.empathy, "bg-pink-400")}
                        ${createEndingStat("Hranice", stats.boundaries, "bg-blue-400")}
                    </div>
                    <button onclick="location.reload()" class="bg-indigo-600 px-8 py-3 rounded-xl font-bold hover:bg-indigo-500 transition">Hrát znovu</button>
                </div>
            `;
        }

        function createEndingStat(label, val, color) {
            return `<div><div class="flex justify-between text-sm mb-1 font-bold text-[#004d7a]"><span>${label}</span><span>${val}%</span></div>
                    <div class="w-full bg-white/30 h-2 rounded-full"><div class="h-full ${color} rounded-full" style="width:${val}%"></div></div></div>`;
        }

        // Start game
        renderScene('intro_1');
    </script>
</body>
</html>
